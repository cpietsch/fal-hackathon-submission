<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blocking — dailies</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%23e8a33d'/%3E%3C/svg%3E" />
<style>
  :root { --bg:#101216; --panel:#191c22; --line:#2b3039; --text:#d7dae0; --dim:#8b919c; --accent:#e8a33d; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font:13px/1.5 system-ui,sans-serif; padding:20px; }
  h1 { font-size:15px; letter-spacing:.14em; margin-bottom:4px; }
  h1 span { color:var(--accent); }
  .sub { color:var(--dim); margin-bottom:18px; }
  .sub a { color:var(--accent); }
  #cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(560px, 1fr)); gap:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; }
  .card .vids { display:flex; gap:8px; }
  .card video { width:50%; border-radius:6px; background:#000; }
  .card .meta { margin-top:8px; color:var(--dim); font-size:12px; }
  .card .id { font-family:ui-monospace,monospace; font-size:10px; color:#565c66; }
</style>
</head>
<body>
  <h1>BLOCK<span>ING</span> — DAILIES</h1>
  <div class="sub">Every generated shot this session: previz next to result. <a href="/">← back to the stage</a></div>
  <div id="cards"></div>
<script>
  fetch('/api/sessions').then(r => r.json()).then(list => {
    const cards = document.getElementById('cards')
    if (!list.length) { cards.innerHTML = '<p style="color:#8b919c">Nothing generated yet.</p>'; return }
    for (const s of list) {
      const el = document.createElement('div')
      el.className = 'card'
      el.innerHTML = `
        <div class="vids">
          <video src="${s.control}" muted loop autoplay playsinline></video>
          <video src="${s.result}" muted loop autoplay playsinline></video>
        </div>
        <div class="meta">${s.prompt ? s.prompt.slice(0, 160) + (s.prompt.length > 160 ? '…' : '') : '(no prompt logged)'}</div>
        <div class="id">${s.id}</div>`
      cards.append(el)
    }
  })
</script>
</body>
</html>
